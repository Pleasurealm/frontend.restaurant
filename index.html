  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ba(244,239,230,.18);\n  --r:14px;\n  --r-sm:10px;\n  --sans:'Archivo',system-ui,sans-serif;\n  --exp:'Archivo Expanded','Archivo',sans-serif;\n  --mono:'JetBrains Mono',ui-monospace,monospace;\n}\n\n*{margin:0;padding:0;box-sizing:border-box}\n\ndeck-stage:not(:defined){visibility:hidden}\nhtml,body{background:#05070f;}\n\n/* ---------- slide shell ---------- */\n.s{\n  font-family:var(--sans);\n  color:var(--ink);\n  background:var(--paper);\n  overflow:hidden;\n  display:flex;flex-direction:column;\n  -webkit-font-smoothing:antialiased;\n}\n.s .frame{\n  flex:1;display:flex;flex-direction:column;\n  padding:84px 116px 64px;\n  position:relative;z-index:2;\n}\n/* dotted print/screen grain on paper */\n.s.dots .frame::before{\n  content:\"\";position:absolute;inset:0;z-index:-1;pointer-events:none;\n  background-image:radial-gradient(rgba(0,47,167,.05) 1px,transparent 1px);\n  background-size:6px 6px;\n}\n/* 48px hairline grid for hero/dark slides */\n.s.grid::before{\n  content:\"\";position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.5;\n  background-image:linear-gradient(var(--gl,rgba(255,255,255,.05)) 1px,transparent 1px),\n                   linear-gradient(90deg,var(--gl,rgba(255,255,255,.05)) 1px,transparent 1px);\n  background-size:64px 64px;\n}\n\n.s--blue{background:var(--blue);color:var(--on-ink);}\n.s--ink{background:var(--ink);color:var(--on-ink);}\n.s--deep{background:var(--blue-deep);color:var(--on-ink);}\n.s--paper2{background:var(--paper-2);}\n\n/* ---------- type ---------- */\n.kick{\n  font-family:var(--mono);font-size:15px;font-weight:500;\n  letter-spacing:.26em;text-transform:uppercase;color:var(--blue);\n  display:inline-flex;align-items:center;gap:14px;\n}\n.kick::before{content:\"\";width:38px;height:2px;background:currentColor;display:inline-block;}\n.s--blue .kick,.s--ink .kick,.s--deep .kick{color:var(--coral);}\n\n.h{font-family:var(--exp);font-weight:800;font-size:80px;line-height:.96;letter-spacing:-.022em;text-transform:u n      <div style=\"display:grid;grid-template-columns:1.12fr .88fr;gap:72px;align-items:center;\">\n        <div>\n          <div class=\"tag rv d1\" style=\"margin-bottom:42px;\"><span class=\"dot\"><\u002Fspan>Concept Brief · London Hospitality Academy<\u002Fdiv>\n          <div class=\"rv d2\" style=\"display:flex;align-items:center;gap:16px;\">\n            <img class=\"wordmark-img\" src=\"4d7a2dc7-b508-4141-a143-0088b98fb54b\" alt=\"FRONTEND\">\n            <span class=\"cursor\" style=\"width:26px;height:96px;margin:0;\"><\u002Fspan>\n          <\u002Fdiv>\n          <p class=\"rv d3\" style=\"font-family:var(--mono);font-size:17px;letter-spacing:.2em;text-transform:uppercase;color:var(--on-ink-2);margin-top:30px;\">The academy for the interface layer of hospitality<\u002Fp>\n          <p class=\"lede rv d4\" style=\"margin-top:32px;max-width:32ch;color:var(--on-ink);\">We train the <em>frontend<\u002Fem> of the restaurant — front of house as a profession, not a stopgap.<\u002Fp>\n          <div class=\"rv d5\" style=\"margin-top:48px;\">\n            <div style=\"font-family:var(--mono);font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:var(--on-ink-3);\">A concept by<\u002Fdiv>\n            <div style=\"font-family:var(--exp);font-weight:700;font-size:25px;margin-top:9px;letter-spacing:-.01em;\">Reha Arslan · Jale Erentok · Shazmeen Ali<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"term rv d4\">\n          <div class=\"bar\"><i class=\"r\"><\u002Fi><i><\u002Fi><i><\u002Fi><span class=\"fn\">~/frontend — deploy<\u002Fspan><\u002Fdiv>\n          <div class=\"body\">\n            <div class=\"row\"><span class=\"cm\">// front of house, professionalised<\u002Fspan><\u002Fdiv>\n            <div class=\"row\"><span class=\"pr\">$<\u002Fspan> frontend deploy --cohort 01<\u002Fdiv>\n            <div class=\"row\"><span class=\"ok\">✓<\u002Fspan> <span class=\"mut\">compiling service layer<\u002Fspan><\u002Fdiv>\n ><\u002Fdiv>\n        <div class=\"cellstat rv d3\"><div class=\"v\">0<\u002Fdiv><div class=\"k\">Central, industry-led academies producing job-ready talent at scale<\u002Fdiv><\u002Fdiv>\n        <div class=\"cellstat rv d4\"><div class=\"v\">FOH<br>+ BOH<\u002Fdiv><div class=\"k\">Roles employers consistently cannot fill from the domestic pipeline<\u002Fdiv><\u002Fdiv>\n        <div class=\"cellstat rv d5\"><div class=\"v\">2017<\u002Fdiv><div class=\"k\">ISC introduced to fund domestic upskilling — the outcome still unmet<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"sfoot\"><span class=\"wm\">FRONT<b>END<\u002Fb><\u002Fspan><span>02 / 13 · The Problem<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 · DIAGNOSIS / STACK -->\n  <section class=\"s dots\" data-label=\"Diagnosis\">\n    <div class=\"frame\">\n      <div class=\"shead\">\n        <span class=\"kick rv d1\">03 · The Diagnosis · Where It Breaks<\u002Fspan>\n        <h2 class=\"h sm rv d2\" style=\"max-width:26ch;\">A perfect dish <em>served badly<\u002Fem> is a system failure at the interface layer.<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"stack\" style=\"margin-top:34px;\">\n        <div class=\"layer be rv d2\">\n          <div class=\"tier\">Back of House<\u002Fdiv>\n          <div class=\"ttl\">The Backend<\u002Fdiv>\n          <div class=\"maps\">Kitchen → Server &amp; Database<\u002Fdiv>\n          <ul>\n            <li>Processes every order<\u002Fli>\n            <li>Holds the data — stock, recipes, prep<\u002Fli>\n            <li>Does the heavy computation<\u002Fli>\n            <li>Professionalised for centuries<\u002Fli>\n          <\u002Ful>\n          <div class=\"seen\">// the guest never sees it<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"conn rv d3\">\n          <div class=\"arrow\">→<\u002Fdiv>\n          <div class=\"clbl\">render( )<\u002Fdiv>\n          <span class=\"flow\"><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"
